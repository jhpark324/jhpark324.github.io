  <text x="600" y="176" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="14" fill="#B45309">추론 / 결정</text>

  <rect x="740" y="120" width="190" height="72" rx="14" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="2"/>
