  <text x="60" y="230" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="15" fill="#4B5563">루프 메모:</text>
  <text x="145" y="230" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="15" fill="#4B5563">툴 실행 결과는 보통 다시 모델로 돌아가고, 그 뒤 미들웨어가 최종 응답을 검사할 수 있다.</text>
