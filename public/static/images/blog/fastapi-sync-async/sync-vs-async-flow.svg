<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F8FAFC"/>
  <rect x="40" y="40" width="1120" height="680" rx="24" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <text x="70" y="95" fill="#0F172A" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="34" font-weight="700">FastAPI에서 동기 I/O와 비동기 I/O</text>
  <text x="70" y="130" fill="#475569" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="18">차이는 요청 자체가 아니라, 기다리는 시간을 누가 부담하느냐에 있다.</text>

  <rect x="70" y="170" width="500" height="500" rx="20" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
  <text x="95" y="215" fill="#9A3412" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="28" font-weight="700">동기 실행 경로</text>

  <rect x="95" y="250" width="450" height="72" rx="14" fill="#FFEDD5" stroke="#FDBA74" stroke-width="2"/>
  <text x="120" y="293" fill="#7C2D12" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="22" font-weight="600">스레드가 요청 처리를 시작</text>

  <path d="M320 322V352" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>
  <path d="M320 352L312 340" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>
  <path d="M320 352L328 340" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>

  <rect x="95" y="365" width="450" height="96" rx="14" fill="#F97316" opacity="0.12" stroke="#EA580C" stroke-width="2"/>
  <text x="120" y="405" fill="#7C2D12" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Blocking I/O 호출</text>
  <text x="120" y="435" fill="#7C2D12" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="18">`requests.get()`, 동기 DB 호출, `time.sleep()`</text>

  <path d="M320 462V492" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>
  <path d="M320 492L312 480" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>
  <path d="M320 492L328 480" stroke="#FB923C" stroke-width="3" stroke-linecap="round"/>

  <rect x="95" y="505" width="450" height="72" rx="14" fill="#FFEDD5" stroke="#FDBA74" stroke-width="2"/>
  <text x="120" y="548" fill="#7C2D12" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="22" font-weight="600">응답이 올 때까지 같은 스레드가 대기</text>

  <text x="95" y="625" fill="#7C2D12" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="18">결과: 기다리는 동안 현재 스레드가 계속 점유된다.</text>

  <rect x="630" y="170" width="500" height="500" rx="20" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="655" y="215" fill="#065F46" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="28" font-weight="700">비동기 실행 경로</text>

  <rect x="655" y="250" width="450" height="72" rx="14" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="680" y="293" fill="#065F46" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="22" font-weight="600">코루틴이 이벤트 루프 스레드에서 시작</text>

  <path d="M880 322V352" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <path d="M880 352L872 340" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <path d="M880 352L888 340" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>

  <rect x="655" y="365" width="450" height="96" rx="14" fill="#10B981" opacity="0.12" stroke="#059669" stroke-width="2"/>
  <text x="680" y="405" fill="#065F46" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="22" font-weight="700">비동기 I/O를 `await`</text>
  <text x="680" y="435" fill="#065F46" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="18">`httpx.AsyncClient`, 비동기 DB 드라이버, `asyncio.sleep()`</text>

  <path d="M880 462V492" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <path d="M880 492L872 480" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <path d="M880 492L888 480" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>

  <rect x="655" y="505" width="215" height="72" rx="14" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="680" y="548" fill="#065F46" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="20" font-weight="600">코루틴이 제어권을 반환</text>

  <rect x="890" y="505" width="215" height="72" rx="14" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="918" y="548" fill="#065F46" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="20" font-weight="600">루프가 다른 작업을 실행</text>

  <text x="655" y="625" fill="#065F46" font-family="'Noto Sans KR', 'Malgun Gothic', Arial, Helvetica, sans-serif" font-size="18">결과: 기다림은 이벤트 루프 스레드 전체가 아니라 현재 코루틴이 부담한다.</text>
</svg>
