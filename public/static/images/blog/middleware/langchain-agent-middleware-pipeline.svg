  <text x="60" y="46" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="28" font-weight="700" fill="#111827">LangChain 에이전트 미들웨어 파이프라인</text>
  <text x="60" y="74" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="16" fill="#4B5563">미들웨어 훅은 HTTP 자체보다 에이전트 루프를 감싼다. 모델 호출, 툴 호출, 에이전트 경계에 개입한다.</text>

  <rect x="60" y="120" width="160" height="72" rx="14" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="140" y="154" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="20" font-weight="700" fill="#1E3A8A">사용자 입력</text>
