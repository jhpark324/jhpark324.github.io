<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <rect width="1200" height="760" rx="32" fill="#F8FAFC" />
  <rect x="60" y="52" width="1080" height="656" rx="28" fill="white" stroke="#E2E8F0" stroke-width="3" />
  <text x="110" y="120" fill="#0F172A" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">프로그램 아래의 계층 구조</text>
  <text x="110" y="160" fill="#475569" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="22">고급언어 코드는 여러 계층을 거쳐 실제 하드웨어 동작으로 내려간다.</text>

  <rect x="120" y="210" width="960" height="122" rx="28" fill="#DBEAFE" stroke="#60A5FA" stroke-width="3" />
  <text x="170" y="266" fill="#0F172A" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">응용 소프트웨어</text>
  <text x="170" y="304" fill="#1E3A8A" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="22">문제를 해결하기 위한 프로그램이며 보통 고급언어로 작성된다.</text>

  <path d="M600 332 L600 378" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" />
  <path d="M584 364 L600 386 L616 364" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

  <rect x="120" y="392" width="960" height="138" rx="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3" />
  <text x="170" y="450" fill="#0F172A" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">시스템 소프트웨어</text>
  <text x="170" y="486" fill="#92400E" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="21">컴파일러는 고급언어를 기계가 이해하는 명령어 형태로 번역한다.</text>
  <text x="170" y="516" fill="#92400E" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="21">운영체제는 메모리, 저장장치, 입출력, 스케줄링을 관리한다.</text>

  <path d="M600 530 L600 576" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" />
  <path d="M584 562 L600 584 L616 562" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

  <rect x="120" y="590" width="960" height="92" rx="28" fill="#DCFCE7" stroke="#22C55E" stroke-width="3" />
  <text x="170" y="646" fill="#0F172A" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">하드웨어</text>
  <text x="408" y="646" fill="#166534" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="22">CPU · 메모리 · I/O 컨트롤러가 인코딩된 명령어와 데이터를 실행한다.</text>

  <rect x="800" y="88" width="250" height="84" rx="18" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2" />
  <text x="830" y="126" fill="#334155" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">핵심</text>
  <text x="830" y="154" fill="#475569" font-family="Malgun Gothic, Segoe UI, Arial, sans-serif" font-size="18">추상화는 복잡함을 숨긴다</text>
</svg>
